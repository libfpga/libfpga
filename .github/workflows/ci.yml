name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install open-source FPGA toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y -qq iverilog verilator yosys z3 python3
      - name: Lint (Verilator -Wall)
        run: make lint
      - name: Simulate (self-checking testbenches, Icarus)
        run: make test
      - name: Synthesis smoke + resource stats (Yosys)
        run: make synth
      - name: Get a modern Yosys + SMT tools (OSS CAD Suite) for formal
        run: |
          cd /tmp
          curl -fsSL -o oss.tgz https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2026-07-04/oss-cad-suite-linux-x64-20260704.tgz
          tar xzf oss.tgz
          echo "/tmp/oss-cad-suite/bin" >> "$GITHUB_PATH"
      - name: Formal verification (induction, modern yosys + z3)
        run: make formal
      - name: Generator (regenerate + verify the MLP example)
        run: make gen
